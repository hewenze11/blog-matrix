version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: bm-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: blogmatrix
      POSTGRES_PASSWORD: blogmatrix123
      POSTGRES_DB: blogmatrix
    volumes:
      - bm_dev_pgdata:/var/lib/postgresql/data
    ports:
      - "5533:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogmatrix"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bm-dev

  redis:
    image: redis:7-alpine
    container_name: bm-dev-redis
    restart: unless-stopped
    ports:
      - "6633:6379"
    networks:
      - bm-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: blog-matrix-backend:dev
    container_name: bm-dev-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://blogmatrix:blogmatrix123@db:5432/blogmatrix
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-32-chars-padded-xx
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: BlogMatrix2024!
      FEISHU_WEBHOOK_URL: ""
    ports:
      - "8100:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bm-dev
    volumes:
      - bm_dev_builds:/tmp/blog-builds

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE=
    image: blog-matrix-frontend:dev
    container_name: bm-dev-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ""
    ports:
      - "3100:3000"
    depends_on:
      - backend
    networks:
      - bm-dev

  nginx:
    image: nginx:alpine
    container_name: bm-dev-nginx
    restart: unless-stopped
    ports:
      - "8180:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - bm-dev

volumes:
  bm_dev_pgdata:
  bm_dev_builds:

networks:
  bm-dev:
    driver: bridge
