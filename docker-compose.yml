version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: blogmatrix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: blogmatrix
      POSTGRES_PASSWORD: blogmatrix123
      POSTGRES_DB: blogmatrix
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogmatrix"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - blogmatrix

  redis:
    image: redis:7-alpine
    container_name: blogmatrix-redis
    restart: unless-stopped
    networks:
      - blogmatrix

  backend:
    image: ghcr.io/hewenze11/blog-matrix-backend:latest
    container_name: blogmatrix-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://blogmatrix:blogmatrix123@db:5432/blogmatrix
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION_SET_IN_ENV}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-BlogMatrix2024!}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-https://open.feishu.cn/open-apis/bot/v2/hook/afcb8993-243a-4d11-801c-d879da200f07}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blogmatrix
    volumes:
      - build_tmp:/tmp/blog-builds

  frontend:
    image: ghcr.io/hewenze11/blog-matrix-frontend:latest
    container_name: blogmatrix-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - blogmatrix

  nginx:
    image: nginx:alpine
    container_name: blogmatrix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - blogmatrix

volumes:
  pgdata:
  build_tmp:

networks:
  blogmatrix:
    driver: bridge
